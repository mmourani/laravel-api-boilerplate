; Xdebug 3 Configuration for Laravel SaaS Boilerplate
; This file configures Xdebug for both development and coverage modes

; Enable Xdebug extension with full path
zend_extension=/opt/homebrew/lib/php/pecl/20240924/xdebug.so

; Set Xdebug mode to both develop and coverage
xdebug.mode=develop,coverage,debug,profile,trace

; Client configuration
xdebug.client_host=localhost
xdebug.client_port=9003
xdebug.discover_client_host=0

; Start debugging automatically with web requests
xdebug.start_with_request=yes

; Profiling and debugging settings
xdebug.output_dir=/tmp
xdebug.log=/tmp/xdebug_log.txt
xdebug.log_level=7

; Code coverage settings for PHPUnit integration
xdebug.coverage.enable=1
xdebug.coverage.include=app/*,database/*
xdebug.coverage.exclude_lines="@(deprecated|codeCoverageIgnore|private|protected)"

; Display settings
xdebug.var_display_max_children=256
xdebug.var_display_max_data=1024
xdebug.var_display_max_depth=5

; CLI color support
xdebug.cli_color=1

; Error display
xdebug.show_error_trace=1
xdebug.show_exception_trace=1
xdebug.show_local_vars=1

; Debug information collection
xdebug.collect_params=4
xdebug.collect_return=1
xdebug.collect_assignments=1

